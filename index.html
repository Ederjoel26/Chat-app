    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <title>Fake chat app</title>
</head>
<body>
  <div class="container">
    
    <div class="top">
      <div class="top-left">
        <button class="btn-arrow-back">
          <i class='bx bx-arrow-back'></i>
        </button>
        <button class="btn-photo-profile">
          <img src="https://image.europafm.com/clipping/cmsimages02/2022/09/12/744EDE75-6626-4CE2-9DE6-EE0E6E2BAA32/harry-styles-premios-tiff-2022_104.jpg?crop=2456,2456,x544,y0&width=1200&height=1200&optimize=low&format=webply" class="lbl-face">
        </button>
        <label class="lbl-name">Harry Styles</label>
      </div>
      <div class="top-rigth">
        <button class="btn-recording">
          <i class='bx bxs-video-recording' ></i>
        </button>
        <button class="btn-phone">
          <i class='bx bxs-phone'></i>
        </button>
        <button class="btn-settings">
          <i class='bx bx-cog bx-spin' ></i>
        </button>
      </div>
    </div>

    <div class="middle">
      <div class="container-middle">
        <div class="message-person">
          <label class="message-content">
            Hola xd
          </label>
          <label class="message-time">
            8:00 PM
          </label>
        </div>
        <div class="message-mine">
          <label class="message-content">
            Hi
          </label>
          <label class="message-time">
            8:00 PM
          </label>
        </div>
        
      </div>
    </div>

    <div class="bottom">
      <div class="bottom-left">
        <button class="btn-emoji">
          <i class='bx bxs-face'></i>
        </button>
        <textarea placeholder="type a message" class="message"></textarea>
        <button class="btn-clip">
          <i class='bx bx-paperclip' ></i>
        </button>
        <button class="btn-camera">
          <i class='bx bxs-camera' ></i>
        </button>
      </div> 
      <button class="btn-microphone">
        <i class='bx bxs-microphone bx-tada' ></i>
      </button>
    </div>
  </div>

</body>
</html>
    <script type="module" src="script.js"></script>
  </body>
</html>
